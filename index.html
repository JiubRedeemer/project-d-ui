<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Mythrill — цифровой лист персонажа для D&D и настольных РПГ</title>
    <meta
      name="description"
      content="Mythrill — бесплатное приложение для настольных РПГ: цифровой лист персонажа, боевой трекер и справочник мастера. Работает офлайн, в браузере и на Android."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mythrill.ru/welcome" />

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mythrill" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:url" content="https://mythrill.ru/welcome" />
    <meta property="og:title" content="Mythrill — цифровой лист персонажа для настольных РПГ" />
    <meta
      property="og:description"
      content="Один инструмент для игрока и мастера: лист персонажа, боевой трекер и справочник кампании. Бесплатно, офлайн, в браузере и на Android."
    />
    <meta property="og:image" content="https://mythrill.ru/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mythrill — цифровой лист персонажа для настольных РПГ" />
    <meta
      name="twitter:description"
      content="Один инструмент для игрока и мастера: лист персонажа, боевой трекер и справочник кампании."
    />
    <meta name="twitter:image" content="https://mythrill.ru/og-image.png" />

    <!-- Favicon: multi-size so Google/Yandex search results and browser tabs pick a crisp icon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- Fonts for the landing page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Theme color for status bar / notch area (Android & iOS PWA) -->
    <meta name="theme-color" content="#1b1a1b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Mythrill" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>

  <body>
    <div id="app"></div>
    <script>
      (function () {
        function setAppHeight() {
          var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight) + 'px';
          document.documentElement.style.setProperty('--app-height', h);
        }
        setAppHeight();
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
        }
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', function () {
          setTimeout(setAppHeight, 100);
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>

</html>
